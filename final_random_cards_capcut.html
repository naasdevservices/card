<!DOCTYPE html><html><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Random Floating Cards</title><style>
/* ===========================
   RESET
=========================== */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    overflow:hidden;

    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    radial-gradient(circle at top,#2b8cff 0%,#08142d 55%,#020817 100%);
}

/* ===========================
   HERO
=========================== */

.hero{

    position:relative;

    width:100%;
    max-width:1400px;

    height:100vh;

    overflow:hidden;

}

/* ===========================
   GLOW SHAPES
=========================== */

.hero::before,
.hero::after{

    content:"";

    position:absolute;

    border:2px solid rgba(71,200,255,.35);

    border-radius:28px;

    filter:drop-shadow(0 0 25px #36c8ff);

}

.hero::before{

    width:230px;
    height:230px;

    left:5%;
    top:8%;

    transform:rotate(35deg);

}

.hero::after{

    width:320px;
    height:320px;

    right:5%;
    bottom:5%;

    transform:rotate(-30deg);

}

/* ===========================
   CARDS
=========================== */

.card{

    position:absolute;

    overflow:hidden;

    border-radius:22px;

    background:rgba(16,34,72,.95);

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(12px);

    box-shadow:
    0 25px 55px rgba(0,0,0,.45);

    opacity:0;

    animation:
    reveal .9s cubic-bezier(.22,1,.36,1) forwards,
    floating 6s ease-in-out infinite;

    transition:.4s;

}

.card img{

    width:100%;
    height:100%;

    object-fit:cover;

}

/* ===========================
   RANDOM POSITIONS
=========================== */

/* Card 1 */

.c1{

    width:340px;
    height:210px;

    top:10%;
    left:8%;

    transform:rotate(-14deg);

    animation-delay:0s,1s;

}

/* Card 2 */

.c2{

    width:300px;
    height:185px;

    top:24%;
    right:7%;

    transform:rotate(12deg);

    animation-delay:.45s,1.45s;

}

/* Card 3 */

.c3{

    width:360px;
    height:225px;

    left:30%;
    bottom:8%;

    transform:rotate(-8deg);

    animation-delay:.9s,1.9s;

}

/* ===========================
   HOVER
=========================== */

.card:hover{

    transform:
    translateY(-12px)
    scale(1.04);

    box-shadow:
    0 35px 70px rgba(0,0,0,.55),
    0 0 30px rgba(61,193,255,.35);

}

/* ===========================
   APPEAR ANIMATION
=========================== */

@keyframes reveal{

0%{

    opacity:0;

    filter:blur(12px);

    transform:
    translateY(80px)
    scale(.82);

}

100%{

    opacity:1;

    filter:blur(0);

}

}

/* ===========================
   FLOATING
=========================== */

@keyframes floating{

0%,100%{

    translate:0 0;

}

50%{

    translate:0 -14px;

}

}

/* ===========================
   MOBILE
=========================== */

@media(max-width:768px){

.hero::before,
.hero::after{

    display:none;

}

.c1{

    width:240px;
    height:150px;

    top:10%;
    left:4%;

}

.c2{

    width:220px;
    height:138px;

    top:32%;
    right:4%;

}

.c3{

    width:250px;
    height:158px;

    top:58%;
    left:15%;

}

}

/* ===========================
   SMALL PHONES
=========================== */

@media(max-width:480px){

.c1{

    width:200px;
    height:125px;
      top:10%;
    left:4%;

}

.c2{

    width:190px;
    height:120px;
    top:32%;
    right:4%;

}

.c3{

    width:210px;
    height:132px;
     bottom:62%;
    left:15%;

}

}
</style></head><body><section class='hero'><div class='glow g1'></div><div class='glow g2'></div><div class='card c1'><img src='img3.jfif'></div><div class='card c2'><img src='img5.jfif'></div><div class='card c3'><img src='img4.jfif'></div></section></body></html>
